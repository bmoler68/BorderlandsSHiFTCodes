# Ingest appdata/BL_SHIFT_CODES.csv into Supabase borderlands_shift.shift_codes_v1.
#
# Secrets (repository Settings → Secrets and variables → Actions):
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#
# REQUIRED: Supabase → Project Settings → Data API → Exposed schemas → add
# borderlands_shift (default is often only public). Else PostgREST returns PGRST106.
# https://supabase.com/docs/guides/api/using-custom-schemas

name: Supabase SHiFT codes ETL

on:
  # Run manually when ETL Dockerfile/scripts or workflow change without a CSV update.
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      # Auto-ingest only when the source dataset changes.
      - "appdata/BL_SHIFT_CODES.csv"

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ETL image
        run: docker build -f etl/Dockerfile -t "shift-codes-etl:${IMAGE_TAG}" .

      - name: Run ETL
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          docker run --rm \
            -e SUPABASE_URL \
            -e SUPABASE_SERVICE_ROLE_KEY \
            "shift-codes-etl:${IMAGE_TAG}"
